services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: pause_project
      MYSQL_USER: pause
      MYSQL_PASSWORD: pausepass
    ports:
      - "3306:3306"
    volumes:
      - pause_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pause_mysql_data:
